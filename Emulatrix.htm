      .question{width:200px;text-align:center;cursor:default;font-size:18px;color:#fff;text-shadow:0 0 3px #000000,0 0 7px #000000}
      .contact{margin-right:10px;font-size:18px;color:#fff;text-shadow:0 0 3px #000000,0 0 7px #000000;text-decoration:none;color:#fff;outline:0}
      .contact:focus{outline:1px solid #fff}

      .desktop{display:none;position:fixed;width:350px;left:0;right:0;top:37px;margin:0 auto;z-index:99;background-color:black;border:1px solid #4b4b4b;border-radius:10px;color:#fff;line-height:1.65;padding:10px;font-size:18px;text-align:center}
      .mobile{display:none;position:fixed;top:0;left:0;right:0;bottom:0;width:100%;text-align:center;width:380px;height:165px;margin:auto auto;color:#fff;font-family:Arial;font-size:20px;cursor:default;line-height:2;padding-left:20px;padding-right:20px;padding-top:15px;padding-bottom:15px;border-radius:10px;background-color:rgba(0,0,0,0.6)}

      svg{display:inline-block;margin-bottom:10px}

      .controls{display:none;position:fixed;left:0;right:0;top:50px;bottom:0;grid-template-columns:auto auto auto;place-content:center;text-align:center;color:#fff;font-size:18px;line-height:1.65}
      .controls_row{padding-top:50px}

      .label_dos{margin-top:10px}
      .label_mobile_controls{position:fixed;right:10px;bottom:10px;color:#fff;text-shadow:0 0 3px #000000,0 0 7px #000000;display:none}

      .upload{position:fixed;left:0;right:0;bottom:10px;background-color:transparent;border:0;padding:0;margin:0;outline:0;width:64px;height:64px;margin:0 auto;cursor:pointer;display:block;filter:drop-shadow(2px 2px 2px #000)}
      .upload:hover{filter:drop-shadow(2px 2px 2px #000) brightness(110%)}
      .upload:focus{outline:1px solid #fff}

      input{display:none}

      .pleasewait{position:fixed;width:64px;height:64px;left:0;right:0;top:0;bottom:0;margin:auto auto;border:0}
      .lds-spinner{color:#fff;display:inline-block;position:relative;width:64px;height:64px}

      function getBooleanSetting(settingName) {
        try {
          var name = "emulatrix" + settingName
          var nameEQ = name + "="
          var ca = document.cookie.split(";")
          for (var i = 0; i < ca.length; i++) {
            var c = ca[i]
            while (c.charAt(0) == " ") {
              c = c.substring(1, c.length)
            }
            if (c.indexOf(nameEQ) == 0) {
              if (c.substring(nameEQ.length, c.length) == "true") {
                return true
              } else {
                return false
              }
            }
          }
        } catch (err) {
          //
        }

        return true
      }

      function setBooleanSetting(settingName, settingValue) {
        try {
          var name = "emulatrix" + settingName
          var value = String(settingValue)
          var days = 999
          var expires = ""
          if (days) {
            var date = new Date()
            date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000)
            expires = "; expires=" + date.toUTCString() + "; SameSite=Lax"
          }
          document.cookie = name + "=" + (value || "") + expires + "; Secure; path=/"
        } catch (err) {
          //
        }
      }

      function isMobileDevice() {
        if (!detectPlaform) {
          return false
        }

        return !!(
          navigator.userAgent.match(/Android/i) ||
          navigator.userAgent.match(/iPhone/i) ||
          navigator.userAgent.match(/iPad/i) ||
          navigator.userAgent.match(/iPod/i)
        )
      }

      function isSoundEnabled() {
        return getBooleanSetting("GAME_SOUND_ENABLED")
      }

      function togglePlatformDetection() {
        detectPlaform = !detectPlaform

        setBooleanSetting("DETECT_PLATFORM", detectPlaform)

        if (detectPlaform) {
          labelMobileControls.style.display = "none"
        } else {
          labelMobileControls.style.display = "block"
        }
      }

      function loadCore(
        coreFile,
        callbackCore,
        callbackDownload,
        callbackUpload,
        callbackSound,
        callbackFullscreen,
        callbackReset
      ) {
        containerGame.style.display = "block"

        var scriptLoader = document.createElement("script")
        scriptLoader.addEventListener("load", function () {
          callbackCore()

          document.addEventListener("keydown", function (event) {
            var KEY_CTRL = event.ctrlKey || event.metaKey
            var KEY_0 = event.code === "Digit0"
            var KEY_1 = event.code === "Digit1"
            var KEY_2 = event.code === "Digit2"
            var KEY_3 = event.code === "Digit3"
            var KEY_F = event.code === "KeyF"
            var KEY_R = event.code === "KeyR"

            if (KEY_CTRL && KEY_0) {
              event.preventDefault()
              window.location.reload()
            }

            if (KEY_CTRL && KEY_1) {
              event.preventDefault()
              if (callbackDownload) {
                window[callbackDownload]()
              }
            }

            if (KEY_CTRL && KEY_2) {
              event.preventDefault()
              if (callbackUpload) {
                window[callbackUpload]()
              }
            }

            if (KEY_CTRL && KEY_3) {
              event.preventDefault()
              if (callbackSound) {
                window[callbackSound]()
                setBooleanSetting(
                  "GAME_SOUND_ENABLED",
                  !getBooleanSetting("GAME_SOUND_ENABLED")
                )
              }
            }

            if (KEY_CTRL && KEY_F) {
              event.preventDefault()
              if (callbackFullscreen) {
                window[callbackFullscreen]()
              }
            }

            if (KEY_CTRL && KEY_R) {
              event.preventDefault()
              if (callbackReset) {
                window[callbackReset]()
              }
            }
          })
        })
        scriptLoader.src = coreFile

        document.getElementsByTagName("head")[0].appendChild(scriptLoader)
      }

      window.addEventListener("load", function () {

        var secNotIframe = window.top === window.self
        var secLocalFile = window.self.location.protocol === "file:"
        try {
          secSameDomain =
            window.top !== window.self &&
            window.top.location.hostname === window.self.location.hostname
        } catch (err) {
          //
        }
        if (secNotIframe || secSameDomain || secLocalFile) {
          pleaseWait = document.querySelector(".pleasewait")
          containerMenu = document.querySelector(".container")
          containerControls = document.querySelector(".controls")
          containerGame = document.getElementById("game")
          labelHowToQuestion = document.querySelector(".question")
          labelHowToDesktop = document.querySelector(".desktop")
          labelHowToMobile = document.querySelector(".mobile")
